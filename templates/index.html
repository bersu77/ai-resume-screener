{% extends "base.html" %}

{% block title %}Upload Resume - AI Resume Screener{% endblock %}

{% block content %}
<div class="hero">
    <h1>Screen Your Resume</h1>
    <p>Upload a resume and paste a job description to get an AI-powered match analysis.</p>
</div>

<form action="{{ url_for('screen') }}" method="POST" enctype="multipart/form-data" class="upload-form">
    <div class="form-group">
        <label for="resume">Upload Resume</label>
        <div class="file-upload">
            <input type="file" id="resume" name="resume" accept=".pdf,.docx,.txt" required>
            <p class="hint">Accepted formats: PDF, DOCX, TXT (max 5MB)</p>
        </div>
    </div>

    <div class="form-group">
        <label for="job_description">Job Description</label>
        <textarea id="job_description" name="job_description" rows="10"
                  placeholder="Paste the job description here..." required></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Screen Resume</button>
</form>
{% endblock %}
